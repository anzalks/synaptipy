codecov:
  require_ci_to_pass: no

# NOTE: do NOT add a fixes: section here.
# Our coverage.xml uses relative paths (relative_files=true in pyproject.toml),
# so Codecov resolves src/synaptipy/__init__.py directly in the git tree without
# any prefix stripping.  Adding fixes: with absolute runner paths causes Codecov
# to switch to strict (non-fuzzy) path matching, which fails because the paths
# in the XML are already relative and the fixes are no-ops — yet Codecov still
# returns "Unknown error" / state=error with 0 files matched.

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        # Aspirational target is 95%.  A drop of up to 5% is tolerated, so the
        # hard floor that fails the PR is 90%.  Anything below 90% is a failure.
        target: 95%
        threshold: 5%
        if_ci_failed: error

    patch:
      default:
        # New code introduced by a PR must be at least 90% covered.
        target: 90%
        threshold: 5%

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false

# Ensure Codecov only considers source code, not test files
ignore:
  - "tests/**"
  - "examples/**"
  - "scripts/**"
  - "installer/**"
  - "docs/**"
