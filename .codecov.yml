codecov:
  require_ci_to_pass: no

coverage:
  precision: 2
  round: down
  range: "90...100"

  status:
    project:
      default:
        target: 95%
        threshold: 5%
        if_ci_failed: error

    patch:
      default:
        target: 90%
        threshold: 5%

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false

# Ensure Codecov only considers source code, not test files
ignore:
  - "tests/**"
  - "examples/**"
  - "scripts/**"
  - "installer/**"
  - "docs/**"
