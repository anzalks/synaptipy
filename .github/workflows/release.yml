name: Release

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.0b1, v0.1.0, v1.0.0, etc.
  workflow_dispatch:
    inputs:
      dry_run:
        description: >
          Dry run: build and test only. Skip TestPyPI, PyPI, and GitHub Release
          publishing. The dist wheel/sdist are uploaded as run artifacts instead.
        type: boolean
        default: true

# Top-level permissions are intentionally minimal.  Each job that needs
# elevated access declares its own permissions block.
permissions: {}

jobs:
  # ── 1. Run the full test suite ────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libegl1 libxcb-cursor0

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" -r requirements.txt

      - name: Lint (syntax errors / undefined names)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run python -m pytest --cov=Synaptipy --cov-report=xml
          else
            python -m pytest --cov=Synaptipy --cov-report=xml
          fi

  # ── 2. Build wheel + sdist ────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution contents
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. Publish to TestPyPI (OIDC Trusted Publisher) ──────────────────────────
  # Skipped on workflow_dispatch: GITHUB_REF_NAME is not a semver tag during
  # manual runs, which would cause the smoke-test install to request a
  # non-existent version from TestPyPI.
  testpypi-publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/synaptipy
    permissions:
      id-token: write  # Mandatory for OIDC Trusted Publisher

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── 4. Smoke-test the TestPyPI install ───────────────────────────────────────
  smoke_test_testpypi:
    name: Smoke test from TestPyPI
    needs: testpypi-publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for TestPyPI package indexing
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in {1..20}; do
            if curl -sf "https://test.pypi.org/simple/synaptipy/" | grep -qF "synaptipy-${VERSION}"; then
              echo "synaptipy ${VERSION} is available in the TestPyPI simple index."
              exit 0
            fi
            echo "Attempt ${i}/20: TestPyPI simple index not ready yet; retrying in 15s..."
            sleep 15
          done
          echo "Timed out waiting for TestPyPI package indexing."
          exit 1

      - name: Install from TestPyPI and verify import
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple \
            "Synaptipy==${GITHUB_REF_NAME#v}"
          python -c "import Synaptipy; print('Synaptipy', Synaptipy.__version__, 'import OK')"

  # ── 5. Publish to official PyPI (OIDC Trusted Publisher) ─────────────────────
  # Skipped on workflow_dispatch (dry_run).
  pypi-publish:
    name: Publish to PyPI
    needs: smoke_test_testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/p/synaptipy
    permissions:
      id-token: write  # Mandatory for OIDC Trusted Publisher

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password -- authentication via OIDC Trusted Publisher

  # ── 6. Create GitHub Release ──────────────────────────────────────────────────
  # On real tag pushes: creates/updates the GitHub Release with wheel + sdist.
  # On workflow_dispatch (dry_run=true): uploads dist as a standard run
  # artifact so the pipeline can be fully rehearsed without any public action.
  release:
    name: Create GitHub Release
    needs: [build, pypi-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run when build succeeded regardless of whether pypi-publish was skipped
    # (dry_run / workflow_dispatch path) or succeeded (real release path).
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.pypi-publish.result == 'success' || needs.pypi-publish.result == 'skipped')
    permissions:
      contents: write   # needed to create/update GitHub Releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # needed to read full CHANGELOG

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Determine pre-release flag
        id: pre
        # Tags containing a/b/rc (e.g. v0.1.0b1) are marked as pre-release
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '[ab]|rc'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "label=beta-nightly" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "label=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract CHANGELOG section for this release
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"           # strip leading 'v'
          # Grab everything between this version header and the next one
          NOTES=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        # softprops/action-gh-release@v2 creates the release if it does not exist
        # and updates (appends files to) the release if it was already created by
        # the installer.yml workflow running in parallel.  The old
        # "gh release delete + recreate" pattern was destructive: it wiped any
        # .exe / .dmg binaries that installer.yml had already attached, because
        # both workflows fire in parallel on the same tag push.
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} (${{ steps.pre.outputs.label }})"
          body_path: release_notes.md
          prerelease: ${{ steps.pre.outputs.prerelease }}
          files: dist/*
          # Never overwrite files already uploaded by installer.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Dry-run: upload dist as run artifact"
        # On workflow_dispatch the dist wheel/sdist are surfaced as run
        # artifacts (the 'dist' artifact from the build job is also available).
        # This step provides a second copy with a distinct name so it is easy
        # to find in the Actions run summary.
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-dist-${{ github.run_id }}
          path: dist/
          retention-days: 7
