name: Synaptipy CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  pull-requests: write
  contents: write

jobs:
  test:
    name: Test and Lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install Linux display dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
          libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
          libxcb-xfixes0 libegl1 libxcb-cursor0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8 'black~=26.1' 'isort~=8.0' pytest pytest-qt pytest-mock pytest-cov nbval matplotlib
        pip install -e .

    - name: Check formatting with black and isort
      run: |
        black --check --diff src/ tests/
        isort --check --diff src/ tests/

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Style violations — scoped to src/ and tests/, uses .flake8 config
        flake8 src/ tests/

    - name: Run tests with coverage
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          xvfb-run python -m pytest -p faulthandler --cov=Synaptipy --cov-report=term-missing --cov-report=xml
        else
          python -m pytest -p faulthandler --cov=Synaptipy --cov-report=term-missing --cov-report=xml
        fi

    # High-DPI scaling check — runs a focused subset of plot tests with
    # QT_SCALE_FACTOR=2 to catch layout/shrinkage regressions under HiDPI.
    # Scoped to one matrix slot (ubuntu/3.11) to keep CI time cheap.
    - name: Run plot tests under high-DPI scaling
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      env:
        QT_QPA_PLATFORM: offscreen
        QT_SCALE_FACTOR: "2"
      run: |
        xvfb-run python -m pytest -p faulthandler \
          tests/application/gui/widgets/ \
          tests/gui/ \
          -v --tb=short -q 2>&1 | tail -30

    # Run example notebooks — catches API regressions that break tutorial code.
    # Uses --nbval-lax: cells must not raise errors (output matching not enforced).
    # Scoped to ubuntu/3.11 to keep CI time cheap.
    - name: Test example notebooks
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        xvfb-run python -m pytest --nbval-lax --maxfail=1 examples/ -v --tb=short

    - name: Coverage Comment
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}

    # Push core test coverage badge endpoint.json to the data branch so the
    # README badge resolves on every branch, not only after merging to main.
    - name: Push coverage badge data
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        python -m pytest tests/core/ -q --cov=Synaptipy.core --cov-report=term --cov-report=xml
        CORE_COVERAGE=$(python -m coverage report --format=total 2>/dev/null || echo "0")
        if   [ "$CORE_COVERAGE" -ge 90 ]; then COLOR="brightgreen"
        elif [ "$CORE_COVERAGE" -ge 75 ]; then COLOR="green"
        elif [ "$CORE_COVERAGE" -ge 60 ]; then COLOR="yellow"
        else COLOR="red"
        fi
        printf '{"schemaVersion":1,"label":"core test coverage","message":"%s%%","color":"%s"}\n' \
          "$CORE_COVERAGE" "$COLOR" > /tmp/endpoint.json
        ORIG_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git fetch origin python-coverage-comment-action-data 2>/dev/null || true
        if git ls-remote --exit-code --heads origin python-coverage-comment-action-data; then
          git checkout -B python-coverage-comment-action-data \
            origin/python-coverage-comment-action-data
        else
          git checkout --orphan python-coverage-comment-action-data
          git rm -rf . --quiet || true
        fi
        cp /tmp/endpoint.json ./endpoint.json
        git add endpoint.json
        git diff --cached --quiet || \
          git commit -m "chore: update coverage badge data [skip ci]"
        git push origin python-coverage-comment-action-data
        git checkout "$ORIG_BRANCH"

  # ---------------------------------------------------------------------------
  # Minimum-viable slot: oldest supported Python + pinned lower-bound versions.
  # Purpose: catch regressions where newer feature syntax or APIs are used that
  # are not available on the project's stated minimum version.
  # ---------------------------------------------------------------------------
  minimum-viable:
    name: Minimum-viable (Python 3.10, lower-bound deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Linux display dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
          libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
          libxcb-xfixes0 libegl1 libxcb-cursor0

    - name: Install minimum-bound dependencies
      # Install exact lower-bound versions to verify the code works at the
      # stated minimum rather than only at the latest patch release.
      run: |
        python -m pip install --upgrade pip
        pip install \
          "numpy==2.0.0" \
          "scipy==1.13.0" \
          "neo==0.14.0" \
          "pyqtgraph==0.13.0" \
          "pyside6==6.7.3" \
          "pandas==2.3.0"
        pip install flake8 pytest pytest-qt pytest-mock pytest-cov
        pip install -e .

    - name: Lint (syntax + undefined names only)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run core and GUI tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        xvfb-run python -m pytest -p faulthandler tests/core/ tests/gui/ -q --tb=short

  # ---------------------------------------------------------------------------
  # Bleeding-edge slot: latest Python + unconstrained upgrades.
  # Purpose: early warning when upstream packages release breaking changes.
  # Failures here are expected and informational only (continue-on-error).
  # ---------------------------------------------------------------------------
  bleeding-edge:
    name: Bleeding-edge (Python 3.12, latest deps)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Linux display dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
          libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
          libxcb-xfixes0 libegl1 libxcb-cursor0

    - name: Install and upgrade all scientific dependencies
      # Start from requirements.txt then force-upgrade the scientific stack
      # to whatever pip resolves as latest.  pyside6 is intentionally excluded
      # from the upgrade because the 6.7.3 pin is required for stability.
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install --upgrade numpy scipy neo pyqtgraph pandas
        pip install flake8 pytest pytest-qt pytest-mock pytest-cov
        pip install -e .

    - name: Report installed versions
      run: |
        python -c "import numpy, scipy, neo, pyqtgraph, pandas; \
          print('numpy', numpy.__version__); \
          print('scipy', scipy.__version__); \
          print('neo', neo.__version__); \
          print('pyqtgraph', pyqtgraph.__version__); \
          print('pandas', pandas.__version__)"

    - name: Lint (syntax + undefined names only)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run core and GUI tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        xvfb-run python -m pytest -p faulthandler tests/core/ tests/gui/ -q --tb=short
