# environment.yml — INSTALL RECIPE (pinned, cross-platform)
# ----------------------------------------------------------------
# This file is the user-facing install recipe. Version pins here are
# tested and must not be changed without re-running the full test suite.
#
# For exact reproducibility of paper results, use instead:
#   paper/frozen_environment_macos_arm64.txt  (pip freeze, Apple M1 Pro)
#   paper/conda_env_macos_arm64.yml           (conda export, Apple M1 Pro)
#
# Usage:
#   conda env create -f environment.yml
#   conda activate synaptipy-repro
name: synaptipy-repro
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.9
  - numpy=2.0.2
  - scipy=1.14.1
  - pandas=2.3.0
  - matplotlib=3.9.2
  - h5py=3.12.1
  - pip
  - setuptools
  - wheel
  - pip:
      - pyside6==6.7.3
      - pyqtgraph==0.13.7
      - neo==0.14.0
      - pynwb==3.1.0
      - dask[array]==2024.8.0
      - quantities==0.16.1
      - hdmf==4.1.0
      - jsonschema==4.25.0
      - ruamel-yaml==0.18.10
      - attrs==25.3.0
      - packaging==25.0
      - platformdirs==4.3.6
      - python-dateutil==2.9.0
      - pytz==2025.1
      - typing-extensions==4.14.0
      - tzlocal==5.3.0
      - synaptipy==0.1.3b5
